version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: agrivision_db
    environment:
      POSTGRES_USER: agrivision
      POSTGRES_PASSWORD: agrivision_secret
      POSTGRES_DB: agrivision_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrivision"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agrivision_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrivision_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://agrivision:agrivision_secret@db:5432/agrivision_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: super_secret_key_change_in_production
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-demo_key}
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - ./backend:/app
      - model_storage:/app/ml_models
      - image_storage:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ──────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrivision_celery
    environment:
      DATABASE_URL: postgresql+asyncpg://agrivision:agrivision_secret@db:5432/agrivision_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - model_storage:/app/ml_models
      - image_storage:/app/uploads
    depends_on:
      - redis
      - db
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agrivision_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: agrivision_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  model_storage:
  image_storage:
